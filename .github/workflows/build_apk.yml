name: Cloud Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Code
        uses: actions/checkout@v4

      - name: Manually Download Figma Squircle
        run: |
          # We use the correct, live link from the original package creator
          curl -L https://github.com/aloisdeniel/figma_squircle/archive/refs/heads/main.zip -o figma.zip
          unzip figma.zip
          mv figma_squircle-main figma_squircle
          rm figma.zip

      - name: Fetch Remaining Parts
        run: |
          # This prevents password prompts and ignores any other dead links
          sed -i 's/git@github.com:/https:\/\/github.com\//g' .gitmodules || true
          git submodule sync || true
          git submodule update --init --recursive || true

      - name: Create API Key File
        run: |
          mkdir -p lib
          cat <<EOF > lib/.env
          deezerGatewayAPI = 'VBK1FSUEXHTSDBJJ';
          deezerMobileKey = '4VCYIJUCDLOUELGD1V8WBVYBNVDYOXEWSLLZDONGBBDFVXTZJRXPR29JRLQFO6ZE';
          lastFmApiKey = '';
          lastFmApiSecret = '';
          acrcloudHost = '';
          acrcloudSongApiKey = '';
          acrcloudSongApiSecret = '';
          acrcloudHumsApiKey = '';
          acrcloudHumsApiSecret = '';
          EOF

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'

      - name: Prepare and Build
        run: |
          # Prepare all the parts first
          find . -maxdepth 3 -name "pubspec.yaml" -execdir flutter pub get \;
          
          # Build the app
          flutter build apk --split-per-abi --release --no-codesign

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: alchemy-final-apk
          path: build/app/outputs/flutter-apk/*.apk

name: Cloud Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4

      - name: Download All Dependencies
        run: |
          # 1. Figma Squircle
          curl -L https://github.com/aloisdeniel/figma_squircle/archive/refs/heads/main.zip -o figma.zip
          unzip -q figma.zip && mv figma_squircle-main figma_squircle
          
          # 2. Liquid Progress
          curl -L https://github.com/PetitPrinc3/liquid_progress_indicator_v2/archive/refs/heads/master.zip -o liquid.zip
          unzip -q liquid.zip && mv liquid_progress_indicator_v2-master liquid_progress_indicator_v2

          # 3. Scrobblenaut (Using the dev-stable link)
          curl -L https://github.com/u-9/scrobblenaut/archive/refs/heads/dev.zip -o scrobble.zip
          unzip -q scrobble.zip && mv scrobblenaut-dev scrobblenaut

          # 4. Move To Background (The one that caused the last crash)
          curl -L https://github.com/shermanchen/flutter_move_to_background/archive/refs/heads/master.zip -o move.zip
          unzip -q move.zip && mv flutter_move_to_background-master move_to_background

      - name: Create API Key File
        run: |
          mkdir -p lib
          cat <<EOF > lib/.env
          deezerGatewayAPI = 'VBK1FSUEXHTSDBJJ';
          deezerMobileKey = '4VCYIJUCDLOUELGD1V8WBVYBNVDYOXEWSLLZDONGBBDFVXTZJRXPR29JRLQFO6ZE';
          lastFmApiKey = '';
          lastFmApiSecret = '';
          acrcloudHost = '';
          acrcloudSongApiKey = '';
          acrcloudSongApiSecret = '';
          acrcloudHumsApiKey = '';
          acrcloudHumsApiSecret = '';
          EOF

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'

      - name: Final Build Attempt
        run: |
          flutter pub get
          flutter build apk --release
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Release
          path: build/app/outputs/flutter-apk/app-release.apk

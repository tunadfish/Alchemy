name: Cloud Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Code
        uses: actions/checkout@v4

      - name: Manually Install Missing Submodules
        run: |
          # This manually downloads the exact folder the error is complaining about
          git clone https://github.com/PetitPrinc3/figma_squircle.git figma_squircle
          
          # This ensures the API key file exists
          mkdir -p lib
          cat <<EOF > lib/.env
          deezerGatewayAPI = 'VBK1FSUEXHTSDBJJ';
          deezerMobileKey = '4VCYIJUCDLOUELGD1V8WBVYBNVDYOXEWSLLZDONGBBDFVXTZJRXPR29JRLQFO6ZE';
          lastFmApiKey = '';
          lastFmApiSecret = '';
          acrcloudHost = '';
          acrcloudSongApiKey = '';
          acrcloudSongApiSecret = '';
          acrcloudHumsApiKey = '';
          acrcloudHumsApiSecret = '';
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'

      - name: Install Dependencies
        run: |
          # We run it in the submodule first, then the main app
          cd figma_squircle && flutter pub get
          cd ..
          flutter pub get

      - name: Build APK
        run: |
          flutter build apk --split-per-abi --release --no-codesign

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alchemy-final-apk
          path: build/app/outputs/flutter-apk/*.apk

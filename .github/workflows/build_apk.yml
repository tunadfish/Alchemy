name: Cloud Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Code
        uses: actions/checkout@v4

      - name: Force Download Missing Folders
        run: |
          # 1. Get Figma Squircle
          curl -L https://github.com/aloisdeniel/figma_squircle/archive/refs/heads/main.zip -o figma.zip
          unzip figma.zip && mv figma_squircle-main figma_squircle && rm figma.zip
          
          # 2. Get Liquid Progress Indicator (The new missing piece)
          curl -L https://github.com/thefalken/liquid_progress_indicator_v2/archive/refs/heads/main.zip -o liquid.zip
          unzip liquid.zip && mv liquid_progress_indicator_v2-main liquid_progress_indicator_v2 && rm liquid.zip

      - name: Create API Key File
        run: |
          mkdir -p lib
          cat <<EOF > lib/.env
          deezerGatewayAPI = 'VBK1FSUEXHTSDBJJ';
          deezerMobileKey = '4VCYIJUCDLOUELGD1V8WBVYBNVDYOXEWSLLZDONGBBDFVXTZJRXPR29JRLQFO6ZE';
          lastFmApiKey = '';
          lastFmApiSecret = '';
          acrcloudHost = '';
          acrcloudSongApiKey = '';
          acrcloudSongApiSecret = '';
          acrcloudHumsApiKey = '';
          acrcloudHumsApiSecret = '';
          EOF

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'

      - name: Prepare and Build
        run: |
          # Skip the broken examples and just focus on the main app
          flutter pub get
          flutter build apk --split-per-abi --release

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: alchemy-final-apk
          path: build/app/outputs/flutter-apk/*.apk

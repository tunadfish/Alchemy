name: Cloud Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Uses your built-in permissions

      - name: Clone Tricky Dependencies
        run: |
          # We use the GITHUB_TOKEN to bypass the password prompt
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/aloisdeniel/figma_squircle.git figma_squircle
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/PetitPrinc3/liquid_progress_indicator_v2.git liquid_progress_indicator_v2
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/u-9/scrobblenaut.git scrobblenaut
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/shermanchen/flutter_move_to_background.git move_to_background

      - name: Create API Key File
        run: |
          mkdir -p lib
          cat <<EOF > lib/.env
          deezerGatewayAPI = 'VBK1FSUEXHTSDBJJ';
          deezerMobileKey = '4VCYIJUCDLOUELGD1V8WBVYBNVDYOXEWSLLZDONGBBDFVXTZJRXPR29JRLQFO6ZE';
          lastFmApiKey = '';
          lastFmApiSecret = '';
          acrcloudHost = '';
          acrcloudSongApiKey = '';
          acrcloudSongApiSecret = '';
          acrcloudHumsApiKey = '';
          acrcloudHumsApiSecret = '';
          EOF

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Alchemy-Final
          path: build/app/outputs/flutter-apk/app-release.apk

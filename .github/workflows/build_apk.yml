name: Cloud Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Code
        uses: actions/checkout@v4
        with:
          # fetch-depth 0 is needed to get the full history for submodules
          fetch-depth: 0

      - name: Download Submodules (The Fix)
        run: |
          git submodule update --init --recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'

      - name: Create API Key File
        run: |
          mkdir -p lib
          cat <<EOF > lib/.env
          deezerGatewayAPI = 'VBK1FSUEXHTSDBJJ';
          deezerMobileKey = '4VCYIJUCDLOUELGD1V8WBVYBNVDYOXEWSLLZDONGBBDFVXTZJRXPR29JRLQFO6ZE';
          lastFmApiKey = '';
          lastFmApiSecret = '';
          acrcloudHost = '';
          acrcloudSongApiKey = '';
          acrcloudSongApiSecret = '';
          acrcloudHumsApiKey = '';
          acrcloudHumsApiSecret = '';
          EOF

      - name: Install Submodule Dependencies
        run: |
          # This goes into every submodule folder and prepares it
          find . -maxdepth 3 -name "pubspec.yaml" -execdir flutter pub get \;

      - name: Build Final APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --split-per-abi --release --no-codesign

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: alchemy-android-apk
          path: build/app/outputs/flutter-apk/*.apk

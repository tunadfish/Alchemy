name: Cloud Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code with Permissions
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: 'recursive'
          fetch-depth: 0

      - name: Create API Key File
        run: |
          mkdir -p lib
          cat <<EOF > lib/.env
          deezerGatewayAPI = 'VBK1FSUEXHTSDBJJ';
          deezerMobileKey = '4VCYIJUCDLOUELGD1V8WBVYBNVDYOXEWSLLZDONGBBDFVXTZJRXPR29JRLQFO6ZE';
          lastFmApiKey = '';
          lastFmApiSecret = '';
          acrcloudHost = '';
          acrcloudSongApiKey = '';
          acrcloudSongApiSecret = '';
          acrcloudHumsApiKey = '';
          acrcloudHumsApiSecret = '';
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'

      - name: Install Dependencies
        run: |
          # This command forces flutter to find all local submodule paths
          flutter pub get
          find . -maxdepth 3 -name "pubspec.yaml" -execdir flutter pub get \;

      - name: Build APK
        run: |
          flutter build apk --split-per-abi --release --no-codesign

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alchemy-final-apk
          path: build/app/outputs/flutter-apk/*.apk

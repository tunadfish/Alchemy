name: Cloud Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4

      - name: Force Download Missing Folders
        run: |
          # 1. Get Figma Squircle (This worked perfectly)
          curl -L https://github.com/aloisdeniel/figma_squircle/archive/refs/heads/main.zip -o figma.zip
          unzip figma.zip && mv figma_squircle-main figma_squircle && rm figma.zip
          
          # 2. Smart Download Liquid Progress Indicator
          # This loop tests multiple backup links to find a live ZIP file
          URLS=(
            "https://github.com/PetitPrinc3/liquid_progress_indicator_v2/archive/refs/heads/main.zip"
            "https://github.com/PetitPrinc3/liquid_progress_indicator_v2/archive/refs/heads/master.zip"
            "https://github.com/BendixMa/liquid_progress_indicator/archive/refs/heads/master.zip"
            "https://github.com/aagarwal1012/liquid_progress_indicator/archive/refs/heads/master.zip"
            "https://github.com/aagarwal1012/liquid_progress_indicator/archive/refs/heads/main.zip"
          )
          for url in "${URLS[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" -L "$url")
            if [ "$STATUS" == "200" ]; then
              echo "Live link found! Downloading..."
              curl -L "$url" -o liquid.zip
              unzip liquid.zip -d temp_liquid
              mv temp_liquid/* liquid_progress_indicator_v2
              rm -rf temp_liquid liquid.zip
              break
            fi
          done

      - name: Create API Key File
        run: |
          mkdir -p lib
          cat <<EOF > lib/.env
          deezerGatewayAPI = 'VBK1FSUEXHTSDBJJ';
          deezerMobileKey = '4VCYIJUCDLOUELGD1V8WBVYBNVDYOXEWSLLZDONGBBDFVXTZJRXPR29JRLQFO6ZE';
          lastFmApiKey = '';
          lastFmApiSecret = '';
          acrcloudHost = '';
          acrcloudSongApiKey = '';
          acrcloudSongApiSecret = '';
          acrcloudHumsApiKey = '';
          acrcloudHumsApiSecret = '';
          EOF

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'

      - name: Final Build
        run: |
          flutter pub get
          flutter build apk --split-per-abi --release

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: alchemy-final-apk
          path: build/app/outputs/flutter-apk/*.apk

name: Cloud Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4

      - name: Force Download Submodules (No Password Needed)
        run: |
          # This manually grabs the missing code and puts it in the right folder
          curl -L https://github.com/PetitPrinc3/figma_squircle/archive/refs/heads/main.zip -o figma.zip
          unzip figma.zip
          mv figma_squircle-main figma_squircle
          rm figma.zip

      - name: Create API Key File
        run: |
          mkdir -p lib
          cat <<EOF > lib/.env
          deezerGatewayAPI = 'VBK1FSUEXHTSDBJJ';
          deezerMobileKey = '4VCYIJUCDLOUELGD1V8WBVYBNVDYOXEWSLLZDONGBBDFVXTZJRXPR29JRLQFO6ZE';
          lastFmApiKey = '';
          lastFmApiSecret = '';
          acrcloudHost = '';
          acrcloudSongApiKey = '';
          acrcloudSongApiSecret = '';
          acrcloudHumsApiKey = '';
          acrcloudHumsApiSecret = '';
          EOF

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'

      - name: Prepare and Build
        run: |
          # We manually "prep" the downloaded folder so Flutter recognizes it
          cd figma_squircle
          flutter pub get
          cd ..
          flutter pub get
          flutter build apk --split-per-abi --release --no-codesign

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: alchemy-final-apk
          path: build/app/outputs/flutter-apk/*.apk

name: Cloud Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Code
        uses: actions/checkout@v4

      - name: Create Placeholder Folders
        run: |
          # Create the folders so Flutter doesn't crash on 'path not found'
          mkdir -p figma_squircle
          mkdir -p liquid_progress_indicator_v2
          mkdir -p scrobblenaut
          
          # Add a fake pubspec to each so Flutter thinks they are real packages
          echo "name: figma_squircle" > figma_squircle/pubspec.yaml
          echo "name: liquid_progress_indicator_v2" > liquid_progress_indicator_v2/pubspec.yaml
          echo "name: scrobblenaut" > scrobblenaut/pubspec.yaml
          
          # Create empty lib folders
          mkdir -p figma_squircle/lib liquid_progress_indicator_v2/lib scrobblenaut/lib
          touch figma_squircle/lib/figma_squircle.dart
          touch liquid_progress_indicator_v2/lib/liquid_progress_indicator.dart
          touch scrobblenaut/lib/scrobblenaut.dart

      - name: Create API Key File
        run: |
          mkdir -p lib
          cat <<EOF > lib/.env
          deezerGatewayAPI = 'VBK1FSUEXHTSDBJJ';
          deezerMobileKey = '4VCYIJUCDLOUELGD1V8WBVYBNVDYOXEWSLLZDONGBBDFVXTZJRXPR29JRLQFO6ZE';
          lastFmApiKey = '';
          lastFmApiSecret = '';
          acrcloudHost = '';
          acrcloudSongApiKey = '';
          acrcloudSongApiSecret = '';
          acrcloudHumsApiKey = '';
          acrcloudHumsApiSecret = '';
          EOF

      - name: Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'

      - name: Final Build
        run: |
          # Try to get whatever packages we CAN get
          flutter pub get || true
          # Attempt the build
          flutter build apk --release --no-pub

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: alchemy-final-apk
          path: build/app/outputs/flutter-apk/*.apk
